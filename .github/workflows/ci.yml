name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - "**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # =============================================================================
  # Guidance and Documentation Validation
  # =============================================================================
  guidance-check:
    name: Validate Guidance Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check GUIDANCE.md presence in key directories
        run: |
          echo "Checking for GUIDANCE.md files in required directories..."

          required_dirs=(
            "packages/compiler"
            "packages/runtime"
            "packages/stdlib"
            "packages/language-server"
            "packages/tooling"
            "examples"
            "docs/design-decisions"
            ".github"
          )

          missing=()
          for dir in "${required_dirs[@]}"; do
            if [ ! -f "$dir/GUIDANCE.md" ]; then
              missing+=("$dir")
            fi
          done

          if [ ${#missing[@]} -ne 0 ]; then
            echo "❌ Missing GUIDANCE.md in directories:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi

          echo "✅ All required GUIDANCE.md files present"

      - name: Validate GUIDANCE.md front matter and structure
        run: |
          echo "Validating GUIDANCE.md structure..."

          # Check that all GUIDANCE.md files have Purpose section
          for file in $(find . -name "GUIDANCE.md" -type f); do
            if ! grep -q "^## Purpose" "$file"; then
              echo "❌ Missing '## Purpose' section in $file"
              exit 1
            fi
          done

          echo "✅ All GUIDANCE.md files have required sections"

  # =============================================================================
  # Markdown and Documentation Linting
  # =============================================================================
  docs-lint:
    name: Lint Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: |
          # Create markdownlint config
          cat > .markdownlint.json << 'EOF'
          {
            "default": true,
            "MD013": false,
            "MD033": false,
            "MD041": false,
            "MD024": { "siblings_only": true }
          }
          EOF

          # Lint documentation (non-blocking for now, just report)
          markdownlint '**/*.md' --ignore node_modules || echo "::warning::Markdown linting issues found"

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."

          # Find all markdown links and verify targets exist
          broken_links=()
          for file in $(find . -name "*.md" -type f -not -path "./node_modules/*"); do
            # Extract relative links (not URLs)
            links=$(grep -oE '\[.*?\]\([^)]+\)' "$file" 2>/dev/null | grep -oE '\([^)]+\)' | tr -d '()' | grep -v '^http' | grep -v '^#' || true)

            dir=$(dirname "$file")
            for link in $links; do
              # Handle anchor links in same file
              if [[ "$link" == \#* ]]; then
                continue
              fi

              # Remove anchor from link
              link_path="${link%%#*}"

              # Resolve relative path
              if [ -n "$link_path" ]; then
                target="$dir/$link_path"
                if [ ! -e "$target" ]; then
                  broken_links+=("$file -> $link_path")
                fi
              fi
            done
          done

          if [ ${#broken_links[@]} -ne 0 ]; then
            echo "::warning::Potentially broken links found:"
            printf '  %s\n' "${broken_links[@]}"
          else
            echo "✅ No broken internal links detected"
          fi

  # =============================================================================
  # Spec Change Protection
  # =============================================================================
  spec-guard:
    name: Spec Change Protection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for spec changes requiring RFC
        run: |
          echo "Checking for changes to specification files..."

          # Get list of changed files
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          spec_files_changed=false
          spec_changes=()

          for file in $changed_files; do
            case "$file" in
              diamond.md|diamond2.md|diamond3.md)
                spec_files_changed=true
                spec_changes+=("$file")
                ;;
              docs/spec/*)
                spec_files_changed=true
                spec_changes+=("$file")
                ;;
            esac
          done

          if [ "$spec_files_changed" = true ]; then
            echo "::warning::Specification files modified:"
            printf '  - %s\n' "${spec_changes[@]}"
            echo ""
            echo "⚠️  Changes to specification files require:"
            echo "   1. An associated RFC in docs/design-decisions/rfcs/"
            echo "   2. Approval from Language WG and Runtime WG leads"
            echo "   3. Updated CHANGELOG.md entry"
            echo ""
            echo "Please ensure RFC linkage in PR description."
          else
            echo "✅ No specification files modified"
          fi

  # =============================================================================
  # Placeholder Jobs (to be expanded as toolchain matures)
  # =============================================================================
  compiler-check:
    name: Compiler Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Cargo workspace exists
        run: |
          if [ -f "packages/compiler/Cargo.toml" ]; then
            echo "Cargo workspace found, running Rust checks..."
            cd packages/compiler
            cargo fmt --check || echo "::warning::Rust formatting issues found"
            cargo clippy --all-targets -- -D warnings || echo "::warning::Clippy warnings found"
            cargo test --all-targets || echo "::warning::Test failures"
          else
            echo "Compiler Cargo workspace not yet initialized"
            echo "This is expected during early development phase"
          fi

  runtime-check:
    name: Runtime Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Runtime workspace exists
        run: |
          if [ -f "packages/runtime/Cargo.toml" ]; then
            echo "Runtime Cargo workspace found, running checks..."
            cd packages/runtime
            cargo test --all-targets || echo "::warning::Test failures"
          else
            echo "Runtime Cargo workspace not yet initialized"
            echo "This is expected during early development phase"
          fi

  tooling-check:
    name: Tooling Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Transpiler
        run: |
          if [ -f "packages/tooling/transpiler/pyproject.toml" ]; then
            echo "Transpiler found, running Python checks..."
            cd packages/tooling/transpiler
            pip install -e ".[dev]" || pip install -e .
            python -m pytest tests/ || echo "::warning::Test failures"
          else
            echo "Transpiler not yet initialized"
            echo "This is expected during early development phase"
          fi

      - name: Validate Prompt Packs
        run: |
          if [ -d "packages/tooling/prompt-packs" ]; then
            echo "Checking prompt pack structure..."
            for pack_dir in packages/tooling/prompt-packs/*/; do
              if [ -d "$pack_dir" ]; then
                pack_name=$(basename "$pack_dir")
                if [ ! -f "$pack_dir/metadata.yaml" ]; then
                  echo "::warning::Missing metadata.yaml in prompt pack: $pack_name"
                fi
              fi
            done
            echo "✅ Prompt pack validation complete"
          else
            echo "Prompt packs directory empty, skipping validation"
          fi

  # =============================================================================
  # Summary Job
  # =============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      [
        guidance-check,
        docs-lint,
        spec-guard,
        compiler-check,
        runtime-check,
        tooling-check,
      ]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY

          # Report on each job
          echo "| Guidance Check | ${{ needs.guidance-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Lint | ${{ needs.docs-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spec Guard | ${{ needs.spec-guard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compiler Check | ${{ needs.compiler-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime Check | ${{ needs.runtime-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tooling Check | ${{ needs.tooling-check.result }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Diamond CI - Building the crystalline foundation for agentic systems*" >> $GITHUB_STEP_SUMMARY

      - name: Final status
        run: |
          if [ "${{ needs.guidance-check.result }}" == "failure" ]; then
            echo "❌ Guidance validation failed"
            exit 1
          fi

          echo "✅ CI pipeline complete"
