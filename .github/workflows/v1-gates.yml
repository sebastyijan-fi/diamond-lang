name: v1-gates

on:
  push:
  pull_request:

jobs:
  v1-gates:
    name: V1 gate
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run V1 validation gates
        run: |
          chmod +x ./scripts/ci/validate_v1_gates.sh
          ./scripts/ci/validate_v1_gates.sh
