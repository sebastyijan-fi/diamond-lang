[package]
name = "diamond-backend"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "Diamond language compiler backend - lowering to Wasm components"
rust-version = "1.74"

[package.metadata]
documentation = "https://github.com/diamond-language/diamond_code"
repository = "https://github.com/diamond-language/diamond_code"
keywords = ["diamond", "compiler", "backend", "wasm"]

[features]
default = ["wasm-components"]
wasm-components = ["dep:wasm-encoder", "dep:wit-bindgen"]
serde = ["dep:serde", "dep:serde_json"]

[dependencies]
anyhow = { workspace = true }
diamond-hir = { path = "../hir" }
indexmap = { workspace = true }
once_cell = { workspace = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
wasm-encoder = { version = "0.27", optional = true }
wit-bindgen = { version = "0.24", optional = true }

[dev-dependencies]
expect-test = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
