[package]
name = "diamond-frontend"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "Diamond language compiler frontend: lexing, parsing, module loading"
rust-version = "1.74"

[package.metadata]
documentation = "https://github.com/diamond-language/diamond_code"
repository = "https://github.com/diamond-language/diamond_code"
keywords = ["diamond", "compiler", "frontend"]

[features]
default = ["diagnostics"]
diagnostics = ["dep:ariadne", "dep:codespan-reporting", "dep:miette"]
serde = ["dep:serde", "dep:serde_json"]

[dependencies]
anyhow = { workspace = true }
ariadne = { workspace = true, optional = true }
codespan-reporting = { workspace = true, optional = true }
indexmap = { workspace = true }
itertools = { workspace = true }
miette = { workspace = true, optional = true }
once_cell = { workspace = true }
diamond-hir = { path = "../hir" }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
strum = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
expect-test = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
