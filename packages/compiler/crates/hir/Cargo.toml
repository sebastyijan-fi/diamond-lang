[package]
name = "diamond-hir"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "High-level intermediate representation for the Diamond language compiler"
rust-version = "1.74"

[package.metadata]
documentation = "https://github.com/diamond-language/diamond_code"
repository = "https://github.com/diamond-language/diamond_code"
keywords = ["diamond", "compiler", "hir"]

[features]
default = ["serde"]
serde = ["dep:serde", "dep:serde_json"]

[dependencies]
anyhow = { workspace = true }
indexmap = { workspace = true }
once_cell = { workspace = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
expect-test = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
