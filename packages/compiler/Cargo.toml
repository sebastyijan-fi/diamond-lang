[workspace]
members = [
    "crates/frontend",
    "crates/hir",
    "crates/backend",
    "crates/cli",
    "tests",
]
default-members = ["crates/cli"]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.0.0"
license = "Apache-2.0"
rust-version = "1.74"
description = "Diamond language reference compiler workspace"

[workspace.package.metadata]
documentation = "https://github.com/diamond-language/diamond_code"
repository = "https://github.com/diamond-language/diamond_code"
keywords = ["diamond", "language", "compiler"]

[workspace.dependencies]
anyhow = "1.0"
ariadne = "0.3"
clap = { version = "4.5", features = ["derive"] }
codespan-reporting = "0.11"
expect-test = "1.4"
indexmap = { version = "2.2", features = ["serde"] }
insta = { version = "1.39", features = ["yaml"] }
itertools = "0.12"
miette = { version = "7.2", features = ["fancy"] }
once_cell = "1.19"
pretty_assertions = "1.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
strum = { version = "0.25", features = ["derive"] }
tempfile = "3.10"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }



[workspace.metadata.ci]
default-coverage-threshold = 70
enforce-guidance = true
