[package]
name = "diamond-compiler-tests"
version = "0.0.0"
edition = "2021"
license = "Apache-2.0"
description = "Integration and regression test harness for the Diamond compiler workspace"
rust-version = "1.74"
publish = false

[package.metadata]
documentation = "https://github.com/diamond-language/diamond_code"
repository = "https://github.com/diamond-language/diamond_code"
keywords = ["diamond", "compiler", "tests"]

[lib]
path = "src/lib.rs"

[dependencies]
anyhow = { workspace = true }
diamond-frontend = { path = "../crates/frontend" }
diamond-backend = { path = "../crates/backend" }
diamond-hir = { path = "../crates/hir" }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
expect-test = { workspace = true }
insta = { workspace = true }
pretty_assertions = { workspace = true }
serde_yaml = { workspace = true }
tempfile = { workspace = true }

[features]
default = ["serde"]
serde = ["dep:serde", "dep:serde_json"]
